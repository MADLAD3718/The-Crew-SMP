name: Draft Release
run-name: Draft requested from ${{ github.actor }}.
on: workflow_dispatch

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run build

      - name: Get Addon Version
        id: version
        run: |
          if [ -f resources/manifest.json ]; then
            MANIFEST="resources/manifest.json"
          elif [ -f behaviours/manifest.json ]; then
            MANIFEST="behaviours/manifest.json"
          else
            echo "No manifest.json found in resources/ or behaviours/" >&2
            exit 1
          fi
          VERSION=$(jq -r 'if (.header.version | type) == "array" then (.header.version | join(".")) else .header.version end' "$MANIFEST")
          echo "Found version $VERSION in $MANIFEST"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check for Existing Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "v$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::Release v$VERSION already exists (draft or published). Bump the version in manifest.json before running this workflow again."
            exit 1
          fi
          echo "No existing release found for v$VERSION - proceeding."

      - name: Create Zip Package
        run: |
          cd resources && zip -r ../resources.zip . && cd ..
          cd behaviours && zip -r ../behaviours.zip . && cd ..
          zip -r The-Crew-SMP.mcaddon resources.zip behaviours.zip

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            The-Crew-SMP.mcaddon

      - name: Checkout existing CDN state
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          ref: site
          path: site-existing

      - name: Prepare CDN Directory
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p "cdn/v$VERSION"
          mv "resources.zip" "cdn/v$VERSION"
          mv "behaviours.zip" "cdn/v$VERSION"

      - name: Build versions manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          EXISTING=$(ls -d site-existing/cdn/v*/ 2>/dev/null | sed -E 's#.*/v([^/]+)/$#\1#')
          ALL=$(printf '%s\n%s\n' "$EXISTING" "$VERSION" | grep -v '^$' | sort -u -t. -k1,1n -k2,2n -k3,3n)
          LATEST=$(echo "$ALL" | tail -n1)
          jq -n --arg latest "$LATEST" \
                --argjson versions "$(echo "$ALL" | jq -R -s -c 'split("\n") | map(select(length > 0))')" \
                '{versions: $versions, latest: $latest}' > cdn/versions.json
          cat cdn/versions.json

      - name: Upload to Github Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cdn
          destination_dir: cdn
          keep_files: true
          publish_branch: site
