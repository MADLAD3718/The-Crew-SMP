name: Draft Release
run-name: Draft requested from ${{ github.actor }}.
on: workflow_dispatch

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run build

      - name: Create Zip Package
        run: zip -r "The-Crew-SMP.zip" resources behaviours

      - name: Copy Zip to MCAddon
        run: cp "The-Crew-SMP.zip" "The-Crew-SMP.mcaddon"

      - name: Get Addon Version
        id: version
        run: |
          if [ -f resources/manifest.json ]; then
            MANIFEST="resources/manifest.json"
          elif [ -f behaviours/manifest.json ]; then
            MANIFEST="behaviours/manifest.json"
          else
            echo "No manifest.json found in resources/ or behaviours/" >&2
            exit 1
          fi
          VERSION=$(jq -r 'if (.header.version | type) == "array" then (.header.version | join(".")) else .header.version end' "$MANIFEST")
          echo "Found version $VERSION in $MANIFEST"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            The-Crew-SMP.mcaddon
            The-Crew-SMP.zip
